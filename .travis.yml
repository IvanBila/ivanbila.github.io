language: node_js
version:
  - "8.11.3"
deploy:
  provider: pages
  skip_cleanup: true
  github-token: $GITHUB_TOKEN
  local_dir: public
  keep-history: true
  on:
    branch: master
cache:
  directories:
    "node_modules"
before_script:
  - npm install -g gatsby
  - npm install -g gatsby-cli
  - npm run build
after_success:
  - npm run deploy
